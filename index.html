<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Odin Project: Library</title>
    <script src="library.js" type="text/javascript" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Digital Library</h1>
    </header>
    <main>
        <div class="button-area">
            <button id="showDialog">+ Add book</button>
        </div>
        <div class="book-cards"></div>
    </main>
    <footer>
        <p>Copyright &copy; 
            <script>
                document.write(new Date().getFullYear());
            </script>
             fruitsofbabylon
        </p>
        <a href="https://github.com/fruitsofbabylon">
            <img src="../github.png" alt="github logo and link">
        </a>
    </footer>
    <dialog id="formDialog">
        <form>
            <h2>Add new book</h2>
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Wuthering Heights" required>
            <label for="author">Author</label>
            <input type="text" id="author" name="author" placeholder="Emily Brontë" required>
            <label for="pages">Number of pages</label>
            <input type="number" id="pages" name="pages" min="1" placeholder="416" required/>
            <div class="read-check">
                <input type="checkbox" id="read" name="read" />
                <label for="read" id="labelSwitch">Not yet read</label>
            </div>
            <button id="submitBtn">Submit</button>
        </form>
</dialog>
</body>
</html>
